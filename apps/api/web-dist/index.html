    <!-- Dark is BAKED INTO THE HTML above, not applied via script, so stale
         cached JS bundles can't leave the page in a light-flash state even
         if they don't know about the new theme logic. The script below
         only REMOVES the dark class if the user has explicitly chosen
         light in their dashboard. Result: marketing pages are always dark
         on first paint, regardless of cache or cold-load. -->
    <script>
      (function() {
        try {
          if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
            document.documentElement.style.background = '';
          }
        } catch { /* private mode */ }
      })();
